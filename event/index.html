<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE Rangers Monthly Event</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden; /* ป้องกันไม่ให้มีแถบเลื่อนซ้ำซ้อน */
  }

  .app-frame {
    width: 100%;
    height: 100vh;
    border: none;
  }
</style>
</head>

<body>

<iframe id="app" class="app-frame"></iframe>

<script>
// แก้ไข: ใส่เครื่องหมาย Backticks (``) ครอบ URL เพื่อให้ Template Literal ทำงานได้ถูกต้อง
const SCRIPT_ID = "AKfycbwEuLU_NjOweKyj7dTMXGsBwJp3Aoxp65ZRLJwTGDoyYpXcOct0TFEmKqGLs6uSgIsM";
const APP_URL = `https://script.google.com/macros/s/${SCRIPT_ID}/exec`;

document.getElementById("app").src = APP_URL;

// ล็อกคลิกขวา
document.addEventListener('contextmenu', e => e.preventDefault());

// ล็อกปุ่มคีย์บอร์ด (F12 และคีย์ลัดเปิด DevTools)
document.addEventListener('keydown', function(e) {
  // บล็อก F12
  if (e.key === "F12") {
    e.preventDefault();
    return false;
  }

  // บล็อก Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C
  if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) {
    e.preventDefault();
    return false;
  }

  // บล็อก Ctrl+U (ดู Source Code) และ Ctrl+S (บันทึกหน้าเว็บ)
  if (e.ctrlKey && ['u', 'U', 's', 'S'].includes(e.key)) {
    e.preventDefault();
    return false;
  }
});
</script>
</body>
</html>
