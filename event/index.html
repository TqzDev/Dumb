<script>
document.getElementById("app").src = APP_URL;

/* ปิดคลิกขวา */
document.addEventListener("contextmenu", e => {
    e.preventDefault();
    return false;
});

/* ปิดการเลือกข้อความ */
document.onselectstart = () => false;
document.ondragstart = () => false;

/* ดักทุกคีย์ */
function blockDevTools(e) {

    if (e.key === "F12") {
        e.preventDefault();
        e.stopImmediatePropagation();
        return false;
    }

    const key = e.key.toUpperCase();

    if (
        (e.ctrlKey && e.shiftKey && ["I","J","C","K"].includes(key)) ||
        (e.ctrlKey && ["U","S"].includes(key))
    ) {
        e.preventDefault();
        e.stopImmediatePropagation();
        return false;
    }
}

window.addEventListener("keydown", blockDevTools, true);
document.addEventListener("keydown", blockDevTools, true);

/* ตรวจจับ DevTools */
let devtoolsOpened = false;

setInterval(() => {

    const widthThreshold = window.outerWidth - window.innerWidth > 120;
    const heightThreshold = window.outerHeight - window.innerHeight > 120;

    if (widthThreshold || heightThreshold) {

        if (!devtoolsOpened) {
            devtoolsOpened = true;

            document.body.innerHTML = `
                <div style="
                    display:flex;
                    justify-content:center;
                    align-items:center;
                    height:100vh;
                    font-family:Arial;
                    font-size:30px;
                    font-weight:bold;
                ">
                    ACCESS DENIED
                </div>
            `;
        }
    }

}, 100);

/* debugger trick */
setInterval(() => {
    debugger;
}, 50);
</script>
