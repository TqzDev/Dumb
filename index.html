<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DUMB API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    
    <style>
        /* โหลด Font แบบระบุชัดเจนป้องกัน Font เชย */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Prompt:wght@300;600&display=swap');
        
        :root {
            --bg-color: #1a1a1c; /* ปรับให้เทาเข้มขึ้นอีกนิดเพื่อความแพง */
            --card-bg: #232326;
        }

        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Inter', 'Prompt', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            width: 100%;
            /* จัดการปัญหา Scroll บน iOS */
            overscroll-behavior-y: none; 
        }

        .background-shading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* ปรับ Gradient ให้ดูนวลขึ้น ไม่เป็นก้อนขาว */
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 80%);
            z-index: -1;
            pointer-events: none;
        }

        .hero-text {
            /* ปรับ clamp ขั้นต่ำเหลือ 2.5rem สำหรับมือถือจอเล็กพิเศษ */
            font-size: clamp(2.5rem, 12vw, 10rem); 
            line-height: 0.85;
            font-weight: 900;
            letter-spacing: -0.07em;
            text-transform: uppercase;
        }

        .text-outline {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            color: transparent;
        }

        /* Glass Card แบบ Mobile-First */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.25rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            transition: border 0.3s ease;
        }

        @media (min-width: 768px) {
            .glass-card {
                padding: 3rem;
                border-radius: 2rem;
            }
        }

        /* ซ่อน Scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="background-shading"></div>

    <!-- Nav: ปรับระยะ Safe Area สำหรับ iPhone -->
    <nav class="fixed top-0 w-full z-50 px-6 py-6 md:px-12 md:py-10 flex justify-between items-center mix-blend-difference pt-[env(safe-area-inset-top)]">
        <div class="font-black text-2xl tracking-tighter">DUMB</div>
        <button class="bg-white text-black px-5 py-2 rounded-full text-[11px] font-bold tracking-widest uppercase hover:scale-105 transition-transform">
            Try Free
        </button>
    </nav>

    <!-- Hero: ใช้ dvh เพื่อให้พอดีจอหน้าจอมือถือจริง -->
    <section class="min-h-[100dvh] flex flex-col justify-center items-center px-6 relative overflow-hidden">
        <div class="w-full text-center z-10 select-none">
            <div class="overflow-hidden">
                <h1 id="pure" class="hero-text">DUMB</h1>
            </div>
            <div class="overflow-hidden">
                <h1 id="motion" class="hero-text text-outline">API</h1>
            </div>
        </div>
        
        <!-- Scroll Line -->
        <div class="absolute bottom-10 flex flex-col items-center opacity-20">
            <div class="w-[1px] h-12 bg-white"></div>
        </div>
    </section>

    <!-- Content Section -->
    <section class="max-w-5xl mx-auto px-6 py-20 md:py-40">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8 items-stretch">
            
            <!-- Card 1 -->
            <div class="reveal glass-card">
                <div>
                    <div class="text-[10px] tracking-[0.4em] text-white/20 font-bold mb-8 uppercase">Free Tier</div>
                    <h2 class="text-4xl md:text-6xl font-black mb-4 tracking-tighter">FREE</h2>
                    <p class="text-white/40 text-sm md:text-lg leading-relaxed font-light">
                        Experience basic features with zero cost. Perfect for individual developers.
                    </p>
                </div>
                <div class="mt-12 pt-6 border-t border-white/5">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-zinc-600 rounded-full"></span>
                        <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Offline</span>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="reveal glass-card border-white/20 bg-[#2d2d31]">
                <div>
                    <div class="text-[10px] tracking-[0.4em] text-white/40 font-bold mb-8 uppercase">Premium</div>
                    <h2 class="text-4xl md:text-6xl font-black mb-4 tracking-tighter">VIP</h2>
                    <p class="text-white/70 text-sm md:text-lg leading-relaxed font-light">
                        Full access to all endpoints with dedicated support and high-rate limits.
                    </p>
                </div>			
                <div class="mt-12 pt-6 border-t border-white/10">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_10px_rgba(34,197,94,0.4)]"></span>
                        <span class="text-[10px] text-white/60 font-bold uppercase tracking-widest">Online</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
	<footer class="py-24 text-center px-6">
		<a href="https://dumb-green.vercel.app" class="text-sm md:text-base font-medium text-white/30 hover:text-white transition-colors tracking-widest uppercase italic">
			dumb-green.vercel.app
		</a>
	</footer>

    <script>
        // Smooth Scroll (Lenis) - ปรับปรุงให้นวลขึ้นบน Touch Screen
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            touchMultiplier: 2
        });
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // GSAP
        gsap.registerPlugin(ScrollTrigger);

        // Hero Reveal
        gsap.from("#pure", { y: "110%", duration: 1.4, ease: "expo.out" });
        gsap.from("#motion", { y: "110%", duration: 1.4, ease: "expo.out", delay: 0.1 });

        // Scroll Parallax (คอมพิวเตอร์เท่านั้น)
        if (window.innerWidth > 1024) {
            gsap.to("#pure", { scrollTrigger: { trigger: "body", start: "top top", scrub: true }, x: -100, opacity: 0.2 });
            gsap.to("#motion", { scrollTrigger: { trigger: "body", start: "top top", scrub: true }, x: 100, opacity: 0.2 });
        }

        // Card Reveal
        document.querySelectorAll('.reveal').forEach((el) => {
            gsap.from(el, {
                scrollTrigger: {
                    trigger: el,
                    start: "top 95%",
                },
                y: 40,
                opacity: 0,
                duration: 1,
                ease: "power3.out"
            });
        });
    </script>
</body>
</html>
