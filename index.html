<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DUMB API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Prompt:wght@300;600&display=swap');
        
        body {
            background-color: #161618;
            color: #ffffff;
            font-family: 'Inter', 'Prompt', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* พื้นหลังแสงฟุ้งที่การันตีว่าไม่ขาดครึ่ง */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.03) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* ปรับ Text ให้เด่นและ Center จริงๆ */
        .hero-text {
            font-size: clamp(3rem, 15vw, 10rem);
            line-height: 0.8;
            font-weight: 900;
            letter-spacing: -0.06em;
            text-transform: uppercase;
        }

        .text-outline {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }

        /* ซ่อน Scrollbar สำหรับความคลีน */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <!-- Navigation: แก้ปัญหาจากภาพที่ไปกองด้านซ้าย -->
    <nav class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-6 md:px-12 md:py-10">
        <div class="font-black text-2xl tracking-tighter">DUMB</div>
        <button class="bg-white text-black px-5 py-2 rounded-full text-[10px] font-black tracking-widest uppercase active:scale-95 transition">
            TRY FREE
        </button>
    </nav>

    <!-- Main Content: บังคับจัดกึ่งกลาง -->
    <main class="flex flex-col items-center w-full">
        
        <!-- Hero Section -->
        <section class="h-[100dvh] w-full flex flex-col justify-center items-center px-6 text-center">
            <div class="overflow-hidden">
                <h1 id="t1" class="hero-text">DUMB</h1>
            </div>
            <div class="overflow-hidden">
                <h1 id="t2" class="hero-text text-outline">API</h1>
            </div>
            
            <!-- Indicator -->
            <div class="absolute bottom-10 w-px h-12 bg-gradient-to-b from-white/20 to-transparent"></div>
        </section>

        <!-- Pricing/Info Section -->
        <section class="w-full max-w-5xl px-6 py-20 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-stretch">
                
                <!-- Card FREE -->
                <div class="reveal glass-card p-8 flex flex-col justify-between min-h-[320px]">
                    <div>
                        <p class="text-[10px] tracking-[0.4em] text-white/20 font-bold mb-6 uppercase">Basic</p>
                        <h2 class="text-4xl font-black mb-4 tracking-tighter">FREE</h2>
                        <p class="text-white/40 text-sm leading-relaxed">
                            Experience basic features with zero cost. Perfect for individual developers.
                        </p>
                    </div>
                    <div class="mt-8 pt-6 border-t border-white/5 flex items-center gap-2">
                        <span class="w-2 h-2 bg-zinc-600 rounded-full"></span>
                        <span class="text-[10px] text-zinc-500 font-bold uppercase">Offline</span>
                    </div>
                </div>

                <!-- Card VIP -->
                <div class="reveal glass-card p-8 flex flex-col justify-between min-h-[320px] bg-white/[0.05] border-white/20">
                    <div>
                        <p class="text-[10px] tracking-[0.4em] text-white/40 font-bold mb-6 uppercase">Pro</p>
                        <h2 class="text-4xl font-black mb-4 tracking-tighter">VIP</h2>
                        <p class="text-white/70 text-sm leading-relaxed">
                            Full access to all endpoints with dedicated support and high-rate limits.
                        </p>
                    </div>
                    <div class="mt-8 pt-6 border-t border-white/10 flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(34,197,94,0.5)]"></span>
                        <span class="text-[10px] text-white/60 font-bold uppercase">Online Now</span>
                    </div>
                </div>

            </div>
        </section>

        <!-- Footer: แก้สี Link ที่พังในภาพ -->
        <footer class="w-full py-20 text-center border-t border-white/5">
            <a href="https://dumb-green.vercel.app" class="text-xs font-medium text-white/20 hover:text-white transition-colors tracking-[0.2em] uppercase">
                dumb-green.vercel.app
            </a>
        </footer>
    </main>

    <script>
        // Smooth Scroll
        const lenis = new Lenis();
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // GSAP Animations
        gsap.registerPlugin(ScrollTrigger);

        // Hero Reveal
        gsap.from("#t1", { y: "100%", duration: 1.5, ease: "expo.out", delay: 0.2 });
        gsap.from("#t2", { y: "100%", duration: 1.5, ease: "expo.out", delay: 0.4 });

        // Scroll Parallax (Desktop only)
        if (window.innerWidth > 1024) {
            gsap.to("#t1", { scrollTrigger: { scrub: true }, x: -100, opacity: 0 });
            gsap.to("#t2", { scrollTrigger: { scrub: true }, x: 100, opacity: 0 });
        }

        // Reveal Cards
        document.querySelectorAll('.reveal').forEach((el) => {
            gsap.from(el, {
                scrollTrigger: {
                    trigger: el,
                    start: "top 90%",
                },
                y: 50,
                opacity: 0,
                duration: 1,
                ease: "power2.out"
            });
        });
    </script>
</body>
</html>
