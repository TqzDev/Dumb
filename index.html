<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DUMB API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    
    <style>
        /* บังคับโหลดฟอนต์และป้องกันฟอนต์ยุคเก่า */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Prompt:wght@300;600&display=swap');
        
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #1a1a1c;
            color: #ffffff;
            /* บังคับใช้ Sans-Serif เสมอเพื่อไม่ให้ดูเก่า */
            font-family: 'Inter', 'Prompt', sans-serif; 
            overflow-x: hidden;
            width: 100vw;
        }

        /* แกนกลางของหน้าเว็บ */
        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Hero Text แบบหดตัวตามจอจริง */
        .hero-text {
            font-size: 14vw; /* ใช้ vw เพื่อให้ขนาดสัมพันธ์กับหน้าจอโทรศัพท์เป๊ะๆ */
            line-height: 0.8;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }
        @media (min-width: 768px) { .hero-text { font-size: 10rem; } }

        .text-outline {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* บังคับ Link ไม่ให้เป็นสีน้ำเงิน */
        a {
            color: inherit;
            text-decoration: none;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, #2a2a2e 0%, #1a1a1c 80%);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="app-container">
        <!-- Navigation: จัดกึ่งกลางและแยกซ้ายขวาแบบถาวร -->
        <nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-6 md:px-12 bg-black/10 backdrop-blur-md">
            <div class="font-black text-2xl tracking-tighter">DUMB</div>
            <button class="bg-white text-black px-5 py-2 rounded-full text-[10px] font-bold tracking-widest uppercase">
                TRY FREE
            </button>
        </nav>

        <!-- Hero: บังคับ Center แบบ absolute -->
        <section class="h-screen w-full flex flex-col justify-center items-center px-6">
            <div class="text-center">
                <div class="overflow-hidden">
                    <h1 id="t1" class="hero-text">DUMB</h1>
                </div>
                <div class="overflow-hidden">
                    <h1 id="t2" class="hero-text text-outline">API</h1>
                </div>
            </div>
            <!-- ลูกศรบอกให้เลื่อนลง -->
            <div class="absolute bottom-10 animate-bounce opacity-20 text-[10px] tracking-[0.4em]">SCROLL</div>
        </section>

        <!-- Content: Card Grid -->
        <section class="w-full max-w-5xl px-6 py-20 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- FREE CARD -->
                <div class="reveal glass-card min-h-[280px]">
                    <div>
                        <p class="text-[10px] tracking-[0.4em] text-white/30 font-bold mb-4 uppercase">Option 01</p>
                        <h2 class="text-4xl font-black mb-4 tracking-tighter">FREE</h2>
                        <p class="text-white/40 text-sm leading-relaxed">Basic features for personal projects.</p>
                    </div>
                    <div class="mt-8 pt-6 border-t border-white/5 flex items-center gap-2">
                        <span class="w-2 h-2 bg-zinc-600 rounded-full"></span>
                        <span class="text-[10px] text-zinc-500 font-bold uppercase">Maintenance</span>
                    </div>
                </div>

                <!-- VIP CARD -->
                <div class="reveal glass-card min-h-[280px] border-white/20">
                    <div>
                        <p class="text-[10px] tracking-[0.4em] text-white/40 font-bold mb-4 uppercase">Option 02</p>
                        <h2 class="text-4xl font-black mb-4 tracking-tighter text-white">VIP</h2>
                        <p class="text-white/70 text-sm leading-relaxed">High-performance access for production.</p>
                    </div>
                    <div class="mt-8 pt-6 border-t border-white/10 flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                        <span class="text-[10px] text-white/60 font-bold uppercase">Online</span>
                    </div>
                </div>

            </div>
        </section>

        <!-- Footer: แก้ปัญหา Link สีน้ำเงิน -->
        <footer class="w-full py-20 text-center border-t border-white/5">
            <a href="https://dumb-green.vercel.app" class="text-[11px] font-bold text-white/20 hover:text-white transition uppercase tracking-widest">
                dumb-green.vercel.app
            </a>
        </footer>
    </div>

    <script>
        // Smooth Scroll
        const lenis = new Lenis();
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // GSAP
        gsap.registerPlugin(ScrollTrigger);

        // Hero Animation
        gsap.from("#t1", { y: "100%", duration: 1.2, ease: "power4.out" });
        gsap.from("#t2", { y: "100%", duration: 1.2, ease: "power4.out", delay: 0.1 });

        // Reveal Cards
        document.querySelectorAll('.reveal').forEach((el) => {
            gsap.from(el, {
                scrollTrigger: {
                    trigger: el,
                    start: "top 95%",
                },
                y: 40,
                opacity: 0,
                duration: 0.8,
                ease: "power2.out"
            });
        });
    </script>
</body>
</html>
