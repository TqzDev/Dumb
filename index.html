<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DUMB API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Prompt:wght@300;600&display=swap');
        
        :root {
            --bg: #0f0f10;
            --accent: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Inter', 'Prompt', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ----------------------------------
           NAVIGATION: บังคับตำแหน่งแบบเด็ดขาด
        ---------------------------------- */
        .nav-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(15,15,16,0.8), transparent);
            backdrop-filter: blur(10px);
        }

        /* ----------------------------------
           HERO: ปรับสัดส่วนให้ Modern
        ---------------------------------- */
        .hero-section {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-title {
            font-size: 18vw; /* ปรับขนาดให้พอดีจอ ไม่เบียดกัน */
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -0.05em;
            margin: 0;
        }

        .hero-outline {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            color: transparent;
        }

        /* ----------------------------------
           CARDS: บังคับให้ดูแพง ไม่ก้อนจิ๋ว
        ---------------------------------- */
        .content-section {
            padding: 0 20px 100px 20px;
            width: 100%;
            max-width: 500px; /* คุมความกว้างในมือถือ */
            margin: 0 auto;
        }

        .premium-card {
            background: #1a1a1c;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 20px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        /* ----------------------------------
           UTILITIES
        ---------------------------------- */
        .tag {
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            font-weight: 700;
            margin-bottom: 12px;
            display: block;
        }

        footer a {
            color: rgba(255,255,255,0.2) !important;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 0.1em;
        }

        @media (min-width: 768px) {
            .hero-title { font-size: 12rem; }
            .content-section { max-width: 1100px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        }
    </style>
</head>
<body>

    <nav class="nav-wrapper">
        <div style="font-weight: 900; fontSize: 24px; letter-spacing: -1px;">DUMB</div>
        <button style="background: white; color: black; padding: 8px 18px; border-radius: 99px; font-size: 11px; font-weight: 900; letter-spacing: 1px;">
            TRY FREE
        </button>
    </nav>

    <main>
        <section class="hero-section">
            <h1 class="hero-title" id="h1">DUMB</h1>
            <h1 class="hero-title hero-outline" id="h2">API</h1>
            <div style="margin-top: 40px; opacity: 0.3; font-size: 10px; letter-spacing: 4px;">SCROLL</div>
        </section>

        <section class="content-section">
            <!-- Card 1 -->
            <div class="premium-card reveal">
                <span class="tag">Edition 01</span>
                <h2 style="font-size: 32px; font-weight: 900; margin-bottom: 16px;">FREE</h2>
                <p style="color: rgba(255,255,255,0.4); line-height: 1.6; font-size: 14px; margin-bottom: 30px;">
                    Perfect for hobbyists and local testing. No credit card required.
                </p>
                <div style="border-top: 1px solid rgba(255,255,255,0.05); pt-20px; padding-top: 20px;">
                    <span class="status-dot" style="background: #444;"></span>
                    <span style="font-size: 10px; font-weight: 700; color: #666; text-transform: uppercase;">Limited Access</span>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="premium-card reveal" style="border-color: rgba(255,255,255,0.15); background: #222225;">
                <span class="tag" style="color: rgba(255,255,255,0.5);">Edition 02</span>
                <h2 style="font-size: 32px; font-weight: 900; margin-bottom: 16px;">VIP</h2>
                <p style="color: rgba(255,255,255,0.7); line-height: 1.6; font-size: 14px; margin-bottom: 30px;">
                    High-speed endpoints with dedicated support for production scale.
                </p>
                <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                    <span class="status-dot" style="background: #22c55e; box-shadow: 0 0 12px #22c55e66;"></span>
                    <span style="font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase;">Online Now</span>
                </div>
            </div>
        </section>

        <footer style="padding: 60px 0; text-align: center;">
            <a href="https://dumb-green.vercel.app">DUMB-GREEN.VERCEL.APP</a>
        </footer>
    </main>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // บังคับ Animation ให้เรียบง่ายและลื่นไหล
        gsap.from("#h1", { y: 50, opacity: 0, duration: 1, ease: "power4.out", delay: 0.2 });
        gsap.from("#h2", { y: 50, opacity: 0, duration: 1, ease: "power4.out", delay: 0.4 });

        document.querySelectorAll('.reveal').forEach((el) => {
            gsap.from(el, {
                scrollTrigger: {
                    trigger: el,
                    start: "top 90%",
                },
                y: 30,
                opacity: 0,
                duration: 0.8,
                ease: "power2.out"
            });
        });
    </script>
</body>
</html>
